services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/v1
    container_name: church-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    networks:
      - church-network

networks:
  church-network:
    external: true
    name: ${DOCKER_NETWORK:-church-network}

